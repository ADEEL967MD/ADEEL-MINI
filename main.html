<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADEEL-MINI | Bot Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&display=swap');
        :root {
            --pink: #ff2d78;
            --purple: #9b5de5;
            --orange: #f97316;
            --bg: #0a0a0f;
            --card-bg: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        body {
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,45,120,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,45,120,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }
        .blob { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.35; }
        .blob-1 { width: 400px; height: 400px; background: var(--pink); top: -100px; right: -100px; animation: blob-move 10s ease-in-out infinite alternate; }
        .blob-2 { width: 300px; height: 300px; background: var(--purple); bottom: -80px; left: -80px; animation: blob-move 14s ease-in-out infinite alternate-reverse; }
        .blob-3 { width: 200px; height: 200px; background: var(--orange); top: 50%; left: 50%; animation: blob-move 8s ease-in-out infinite alternate; }
        @keyframes blob-move {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.15); }
        }
        .wrapper { width: 100%; max-width: 560px; z-index: 10; }
        .top-badge { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 28px; animation: slide-down 0.6s ease; }
        @keyframes slide-down { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .live-pill {
            background: rgba(255,45,120,0.15);
            border: 1px solid rgba(255,45,120,0.3);
            color: var(--pink);
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot { width: 7px; height: 7px; background: var(--pink); border-radius: 50%; animation: blink 1.2s ease-in-out infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--pink); }
            50% { opacity: 0.3; box-shadow: none; }
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: scale-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(20px);
        }
        @keyframes scale-in { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--pink), var(--purple), var(--orange), transparent);
            animation: shimmer-line 3s linear infinite;
        }
        @keyframes shimmer-line { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .bot-icon-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px; height: 100px;
            margin-bottom: 28px;
        }
        .bot-icon-bg {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            opacity: 0.2;
            animation: icon-pulse 3s ease-in-out infinite;
        }
        @keyframes icon-pulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.1); opacity: 0.35; } }
        .bot-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
            animation: float-icon 4s ease-in-out infinite;
        }
        @keyframes float-icon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .bot-name {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 30%, var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bot-tagline { color: #555; font-size: 0.95rem; font-weight: 400; margin-bottom: 36px; letter-spacing: 0.5px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 36px; }
        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px 10px;
            transition: 0.3s;
        }
        .stat-box:hover { background: rgba(255,45,120,0.08); border-color: rgba(255,45,120,0.3); transform: translateY(-4px); }
        .stat-num { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
        .stat-tag { font-size: 0.65rem; color: #444; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .stat-box:nth-child(1) .stat-num { color: var(--pink); }
        .stat-box:nth-child(2) .stat-num { color: var(--purple); }
        .stat-box:nth-child(3) .stat-num { color: var(--orange); }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-main::before { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.12); opacity: 0; transition: 0.3s; }
        .btn-main:hover::before { opacity: 1; }
        .btn-main:hover { transform: translateY(-3px); }
        .btn-primary { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; box-shadow: 0 10px 30px rgba(255,45,120,0.3); }
        .btn-secondary { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: #aaa; }
        .btn-secondary:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .footer { margin-top: 28px; text-align: center; font-size: 0.75rem; color: #2a2a2a; letter-spacing: 1px; animation: fade-in 1s ease 0.5s both; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .footer span { color: var(--pink); font-weight: 700; }
        @media (max-width: 480px) { .card { padding: 36px 22px; border-radius: 22px; } .bot-name { font-size: 2rem; } .stats-row { gap: 8px; } }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="wrapper">
        <div class="top-badge">
            <div class="live-pill"><div class="live-dot"></div>Server Active</div>
        </div>
        <div class="card">
            <div class="bot-icon-wrap">
                <div class="bot-icon-bg"></div>
                <i class="fas fa-robot bot-icon"></i>
            </div>
            <div class="bot-name">ADEEL-MINI</div>
            <div class="bot-tagline">WhatsApp Bot &mdash; Built for Speed</div>
            <div class="stats-row">
                <div class="stat-box"><div class="stat-num">ON</div><div class="stat-tag">Status</div></div>
                <div class="stat-box"><div class="stat-num">99%</div><div class="stat-tag">Uptime</div></div>
                <div class="stat-box"><div class="stat-num"><i class="fas fa-bolt" style="font-size:1.2rem"></i></div><div class="stat-tag">Fast</div></div>
            </div>
            <div class="btn-group">
                <a href="#" class="btn-main btn-primary"><i class="fas fa-circle-check"></i> Server Running</a>
                <a href="https://wa.me/923035512967" target="_blank" class="btn-main btn-secondary"><i class="fab fa-whatsapp"></i> Owner: +923035512967</a>
            </div>
        </div>
        <div class="footer">Powered by <span>ADEEL-MINI</span> &bull; All Rights Reserved</div>
    </div>
</body>
</html>
