<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADEEL-MINI | Server Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&display=swap');

        :root {
            --primary: #a855f7;
            --secondary: #7c3aed;
            --success: #34d399;
            --accent: #f472b6;
            --dark: #06030f;
            --glass: rgba(168, 85, 247, 0.04);
            --border: rgba(168, 85, 247, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        /* ANIMATED BACKGROUND */
        .glow-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 20%, rgba(168,85,247,0.18), transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(244,114,182,0.12), transparent 60%);
            animation: pulse-bg 10s ease-in-out infinite;
        }
        @keyframes pulse-bg {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* FLOATING PARTICLES */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.25;
            animation: float-particle 22s linear infinite;
        }
        @keyframes float-particle {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.25; }
            90% { opacity: 0.25; }
            100% { transform: translateY(-100vh) translateX(80px); opacity: 0; }
        }
        .particle:nth-child(2) { left: 15%; animation-delay: 2s; animation-duration: 28s; }
        .particle:nth-child(3) { left: 35%; animation-delay: 5s; animation-duration: 24s; background: var(--accent); }
        .particle:nth-child(4) { left: 55%; animation-delay: 3s; animation-duration: 30s; }
        .particle:nth-child(5) { left: 75%; animation-delay: 7s; animation-duration: 26s; background: var(--accent); }
        .particle:nth-child(6) { left: 90%; animation-delay: 1s; animation-duration: 20s; }
        .particle:nth-child(7) { left: 25%; animation-delay: 9s; animation-duration: 25s; }
        .particle:nth-child(8) { left: 45%; animation-delay: 4s; animation-duration: 32s; background: var(--accent); }
        .particle:nth-child(9) { left: 65%; animation-delay: 6s; animation-duration: 22s; }
        .particle:nth-child(10) { left: 85%; animation-delay: 8s; animation-duration: 27s; }

        .container { width: 100%; max-width: 600px; position: relative; margin: auto; z-index: 10; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: 60px 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 80px rgba(168,85,247,0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: card-entrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes card-entrance {
            0% { opacity: 0; transform: translateY(50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* GLOWING TOP BORDER */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), var(--primary), transparent);
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .card::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            border-radius: 36px;
            z-index: -1;
            opacity: 0.08;
            filter: blur(25px);
            animation: border-glow 4s ease-in-out infinite;
        }
        @keyframes border-glow { 0%,100% { opacity: 0.08; } 50% { opacity: 0.18; } }

        /* LOGO */
        .logo-wrapper { position: relative; display: inline-block; margin-bottom: 30px; }
        .logo {
            width: 115px; height: 115px;
            border-radius: 28px;
            border: 2px solid rgba(168,85,247,0.25);
            animation: float 5s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(168,85,247,0.35);
        }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
        .logo-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 145px; height: 145px;
            background: radial-gradient(circle, rgba(168,85,247,0.4), transparent 70%);
            border-radius: 50%;
            animation: glow-pulse 2.5s ease-in-out infinite;
            z-index: -1;
        }
        @keyframes glow-pulse { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.4; } 50% { transform: translate(-50%,-50%) scale(1.2); opacity: 0.9; } }

        /* TITLE */
        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 20%, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradient-shift 5s ease infinite;
        }
        @keyframes gradient-shift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .subtitle { color: #4a3060; font-size: 1rem; margin-bottom: 40px; font-weight: 500; }

        /* STATUS BADGE */
        .status-badge {
            background: rgba(52, 211, 153, 0.08);
            color: var(--success);
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            border: 1px solid rgba(52,211,153,0.2);
            box-shadow: 0 8px 25px rgba(52,211,153,0.15);
            animation: badge-entrance 1s ease 0.3s both;
        }
        @keyframes badge-entrance { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        .status-dot {
            width: 11px; height: 11px;
            background: var(--success);
            border-radius: 50%;
            position: relative;
            animation: pulse-dot 1.5s infinite;
        }
        .status-dot::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 100%; height: 100%;
            background: var(--success);
            border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-dot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes pulse-ring { 0% { transform: translate(-50%,-50%) scale(1); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; } }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 40px; }

        .stat-card {
            background: rgba(168,85,247,0.04);
            padding: 22px 15px;
            border-radius: 22px;
            border: 1px solid var(--border);
            transition: 0.3s;
            animation: stat-entrance 0.6s ease both;
        }
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        @keyframes stat-entrance { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        .stat-card:hover {
            background: rgba(168,85,247,0.09);
            border-color: rgba(168,85,247,0.3);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(168,85,247,0.15);
        }

        .stat-icon {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { font-size: 0.72rem; color: #4a3060; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .stat-value { font-size: 1.7rem; font-weight: 800; color: #fff; }

        /* CTA BUTTON */
        .cta-button {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(135deg, var(--secondary), var(--primary), var(--accent));
            color: #fff;
            text-decoration: none;
            border-radius: 22px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 15px 40px rgba(124,58,237,0.4);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            animation: cta-entrance 0.8s ease 0.5s both;
        }
        @keyframes cta-entrance { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .cta-button::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            transform: translate(-50%,-50%);
            transition: width 0.5s, height 0.5s;
        }
        .cta-button:hover::before { width: 300px; height: 300px; }
        .cta-button:hover { transform: translateY(-5px); box-shadow: 0 22px 55px rgba(168,85,247,0.55); }
        .cta-text { position: relative; z-index: 1; }

        /* FOOTER */
        .footer { margin-top: 50px; font-size: 0.82rem; color: #2a1840; letter-spacing: 1px; animation: footer-entrance 1s ease 0.7s both; }
        @keyframes footer-entrance { 0% { opacity: 0; } 100% { opacity: 1; } }
        .footer b { color: var(--primary); font-weight: 800; }

        @media (max-width: 768px) {
            body { padding: 30px 15px; }
            .card { padding: 40px 22px; border-radius: 28px; }
            h1 { font-size: 2rem; }
            .logo { width: 95px; height: 95px; }
            .stats-grid { grid-template-columns: 1fr; }
            .cta-button { padding: 18px 38px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
                <img src="https://files.catbox.moe/btwcnl.jpg" class="logo" alt="ADEEL-MINI">
            </div>

            <h1>ADEEL-MINI</h1>
            <p class="subtitle">WhatsApp Bot by ADEEL</p>

            <div class="status-badge">
                <div class="status-dot"></div>
                <span>SERVER RUNNING</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-rocket"></i></div>
                    <div class="stat-label">Status</div>
                    <div class="stat-value">Online</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-server"></i></div>
                    <div class="stat-label">Uptime</div>
                    <div class="stat-value">99.9%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                    <div class="stat-label">Response</div>
                    <div class="stat-value">Fast</div>
                </div>
            </div>

            <a href="/minibot" target="_blank" class="cta-button">
                <span class="cta-text"><i class="fas fa-link"></i> CONNECT BOT NOW</span>
            </a>
        </div>

        <div class="footer">
            Powered by Excellence<br>
            © <b>ADEEL-MINI</b>
        </div>
    </div>
</body>
</html>
